<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vega Autofill</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f9fafb;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #4338ca;
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    #errorMsg {
      color: #dc2626;
      font-size: 12px;
      margin-top: 8px;
    }
    .shortcuts {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }
    .shortcuts h3 {
      font-size: 13px;
      margin: 0 0 8px 0;
      color: #374151;
    }
    .shortcut-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    kbd {
      background-color: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 2px 4px;
      font-family: inherit;
      font-size: 11px;
      color: #374151;
    }
  </style>
</head>
<body>
  <h2>✨ Vega Smart Autofill</h2>
  <div id="status" class="status">Loading profile...</div>
  <button id="autofillBtn" disabled>Autofill Form</button>
  <div id="errorMsg"></div>

  <div class="shortcuts">
    <h3>Useful Shortcuts</h3>
    <div class="shortcut-row">
      <span>Autofill Form</span>
      <span><kbd>⌘</kbd> + <kbd>L</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Close Extension</span>
      <span><kbd>Esc</kbd></span>
    </div>
  </div>

  <div style="display: flex; gap: 8px; margin-top: 12px;">
    <button id="debugToggleBtn" style="flex: 1; background-color: #f3f4f6; color: #374151; font-size: 12px; padding: 6px;">Show Debug Logs</button>
    <button id="clearLogsBtn" style="display: none; flex: 1; background-color: #f3f4f6; color: #374151; font-size: 12px; padding: 6px;">Clear Logs</button>
  </div>
  <textarea id="debugLogs" readonly style="display: none; width: 100%; height: 100px; margin-top: 8px; font-family: monospace; font-size: 10px; border: 1px solid #d1d5db; border-radius: 4px; padding: 4px; box-sizing: border-box;"></textarea>

  <script src="popup.js"></script>
</body>
</html>
